{% extends "base.html" %}
{% block title %}Historial{% endblock %}

{% block content %}
<h4 class="mb-3"><i class="bi bi-clock-history"></i> Historial de Chequeos</h4>

<!-- Filters -->
<div class="card shadow-sm mb-3">
    <div class="card-body py-2">
        <form id="filterForm" class="row g-2 align-items-end">
            <div class="col-6 col-md-3">
                <label class="form-label small mb-0">Desde</label>
                <input type="date" id="dateFrom" class="form-control form-control-sm">
            </div>
            <div class="col-6 col-md-3">
                <label class="form-label small mb-0">Hasta</label>
                <input type="date" id="dateTo" class="form-control form-control-sm">
            </div>
            <div class="col-6 col-md-3">
                <label class="form-label small mb-0">Sector</label>
                <select id="filterBuilding" class="form-select form-select-sm">
                    <option value="">Todos</option>
                </select>
            </div>
            <div class="col-6 col-md-3">
                <label class="form-label small mb-0">Recepcionista</label>
                <select id="filterRec" class="form-select form-select-sm">
                    <option value="">Todos</option>
                </select>
            </div>
        </form>
    </div>
</div>

<!-- Results -->
<div class="table-responsive">
    <table class="table table-sm table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>Fecha</th>
                <th>Habitación</th>
                <th>Recepcionista</th>
                <th>Cupos</th>
                <th class="d-none d-md-table-cell">Limp.</th>
                <th class="d-none d-md-table-cell">Baños</th>
                <th class="d-none d-md-table-cell">Insum.</th>
                <th class="d-none d-md-table-cell">Ilum.</th>
                <th class="d-none d-md-table-cell">Agua</th>
                <th class="d-none d-md-table-cell">Vent.</th>
                <th class="d-none d-md-table-cell">Cort.</th>
                <th class="d-none d-md-table-cell">Estuf.</th>
                <th class="d-none d-md-table-cell">Mob.</th>
                <th class="d-none d-md-table-cell">Chap.</th>
                <th>Casill.</th>
                <th>Obs.</th>
            </tr>
        </thead>
        <tbody id="historyBody"></tbody>
    </table>
</div>

<nav id="pagination" class="d-flex justify-content-center"></nav>
{% endblock %}

{% block scripts %}
<script>
let currentPage = 1;

async function loadBuildings() {
    // Fetch unique buildings from receptionists endpoint or hardcode
    const buildings = {{ buildings|default([])|tojson }};
}

async function loadReceptionists() {
    const resp = await fetch('/api/receptionists');
    const data = await resp.json();
    const sel = document.getElementById('filterRec');
    data.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.id;
        opt.textContent = r.name;
        sel.appendChild(opt);
    });
}

async function loadHistory(page) {
    currentPage = page || 1;
    const params = new URLSearchParams({page: currentPage, per_page: 50});
    const dateFrom = document.getElementById('dateFrom').value;
    const dateTo = document.getElementById('dateTo').value;
    const building = document.getElementById('filterBuilding').value;
    const rec = document.getElementById('filterRec').value;
    if (dateFrom) params.set('date_from', dateFrom);
    if (dateTo) params.set('date_to', dateTo);
    if (building) params.set('building', building);
    if (rec) params.set('receptionist_id', rec);

    const resp = await fetch(`/api/history?${params}`);
    const data = await resp.json();

    const tbody = document.getElementById('historyBody');
    tbody.innerHTML = '';

    if (data.items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="16" class="text-center text-muted">Sin registros</td></tr>';
    }

    data.items.forEach(c => {
        const badge = v => v === 'ok'
            ? '<span class="badge bg-success">OK</span>'
            : v === 'x'
            ? '<span class="badge bg-danger">X</span>'
            : `<span class="badge bg-info">${v}</span>`;

        tbody.innerHTML += `<tr>
            <td class="small text-nowrap">${c.created_at}</td>
            <td class="fw-bold">${c.room_code}</td>
            <td>${c.receptionist_name}</td>
            <td>${badge(c.disponibilidad_cupos)}</td>
            <td class="d-none d-md-table-cell">${badge(c.limpieza_general)}</td>
            <td class="d-none d-md-table-cell">${badge(c.limpieza_banos)}</td>
            <td class="d-none d-md-table-cell">${badge(c.insumos_basicos)}</td>
            <td class="d-none d-md-table-cell">${badge(c.iluminacion)}</td>
            <td class="d-none d-md-table-cell">${badge(c.agua)}</td>
            <td class="d-none d-md-table-cell">${badge(c.ventanas)}</td>
            <td class="d-none d-md-table-cell">${badge(c.cortinas)}</td>
            <td class="d-none d-md-table-cell">${badge(c.estufas)}</td>
            <td class="d-none d-md-table-cell">${badge(c.mobiliario)}</td>
            <td class="d-none d-md-table-cell">${badge(c.chapas)}</td>
            <td>${badge(c.casilleros)}</td>
            <td class="small">${c.observaciones || '-'}</td>
        </tr>`;
    });

    // Pagination
    const nav = document.getElementById('pagination');
    if (data.pages > 1) {
        let html = '<ul class="pagination pagination-sm">';
        for (let i = 1; i <= data.pages; i++) {
            html += `<li class="page-item ${i === currentPage ? 'active' : ''}">
                <a class="page-link" href="#" onclick="loadHistory(${i});return false">${i}</a>
            </li>`;
        }
        html += '</ul>';
        nav.innerHTML = html;
    } else {
        nav.innerHTML = '';
    }
}

// Load buildings into filter
fetch('/api/receptionists').then(r => r.json()).then(() => {});
loadReceptionists();

// Set buildings
const buildingSel = document.getElementById('filterBuilding');
const buildings = [
    '1F','2F','3F','4F','5F','6F','7F','8F','9F','10F','11F','12F','13F','14F',
    '41G','42G','43G','44G',
    'S18','S20','S21','S22','S23','S24','S25','S27','S28','S29',
    'S33','S34','S35','S36','S37','S38','S39','S40'
];
buildings.forEach(b => {
    const opt = document.createElement('option');
    opt.value = b;
    opt.textContent = b;
    buildingSel.appendChild(opt);
});

// Auto-load on filter change
['dateFrom','dateTo','filterBuilding','filterRec'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => loadHistory(1));
});

loadHistory(1);
</script>
{% endblock %}
