<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}Camp Checklist{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top app-navbar">
        <div class="container-fluid app-navbar-shell">
            <div class="app-navbar-top">
                <div class="app-navbar-side app-navbar-left">
                    <span class="logo-slot">
                        <img
                            src="{{ url_for('static', filename='css/img/Aramark.png') }}"
                            alt="Aramark"
                            class="corner-logo"
                            onerror="this.parentElement.style.display='none'"
                        >
                    </span>
                </div>

                <a class="navbar-brand fw-bold mb-0 app-navbar-brand" href="/">
                    <i class="bi bi-clipboard-check"></i> CampCheck
                </a>

                <div class="app-navbar-side app-navbar-right">
                    <span class="logo-slot">
                        <img
                            src="{{ url_for('static', filename='css/img/Escondida.png') }}"
                            alt="Escondida"
                            class="corner-logo"
                            onerror="this.parentElement.style.display='none'"
                        >
                    </span>
                    <button class="navbar-toggler ms-2" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" aria-controls="navMain" aria-expanded="false" aria-label="Alternar navegación">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                </div>
            </div>

            <div class="collapse navbar-collapse app-navbar-menu" id="navMain">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
                            <i class="bi bi-house"></i> Inicio
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/dashboard' %}active{% endif %}" href="/dashboard">
                            <i class="bi bi-graph-up"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/history' %}active{% endif %}" href="/history">
                            <i class="bi bi-clock-history"></i> Historial
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/receptionists' %}active{% endif %}" href="/receptionists">
                            <i class="bi bi-people"></i> Recepcionistas
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container-fluid px-2 px-md-4 py-3">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
