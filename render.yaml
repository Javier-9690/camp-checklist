databases:
  - name: kpi-db

services:
  - type: web
    name: camp-checklist
    runtime: python
    buildCommand: pip install -r requirements.txt && python seed_db.py
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kpi-db
          property: connectionURI
      - key: SECRET_KEY
        generateValue: true
