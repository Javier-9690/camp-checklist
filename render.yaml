databases:
  - name: camp-checklist-db
    plan: free
    databaseName: camp_checklist
    user: camp_user

services:
  - type: web
    name: camp-checklist
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt && python seed_db.py
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: camp-checklist-db
          property: connectionURI
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
